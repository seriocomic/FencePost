{% extends "base.html" %}
{% block title %}FencePost — Login{% endblock %}
{% block body %}
<div class="login-wrap">
  <div class="login-box">
    <div class="login-title">FencePost</div>
    <div class="login-subtitle">Firewall dashboard — sign in to continue</div>
    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-input" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
